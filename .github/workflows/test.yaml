name: Test

on:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/ISSUE_TEMPLATE/**"
  pull_request:
    branches:
      - main

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t greenlight:test .

      - name: Start container
        run: |
          docker run -d --name test-app \
            -p 3000:3000 \
            -e UNIFI_HOST=https://127.0.0.1 \
            -e UNIFI_API_KEY=test-key \
            -e UNIFI_SITE=default \
            -e PORT=3000 \
            greenlight:test

      - name: Wait for healthy
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "App is up"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start"
          docker logs test-app
          exit 1

      - name: E2E — serves frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          [ "$STATUS" = "200" ] || { echo "Expected 200, got $STATUS"; exit 1; }

      - name: E2E — static assets load
        run: |
          curl -sf http://localhost:3000/style.css > /dev/null
          curl -sf http://localhost:3000/app.js > /dev/null

      - name: E2E — API returns error without valid UniFi
        run: |
          BODY=$(curl -s http://localhost:3000/api/filters)
          echo "$BODY"
          echo "$BODY" | grep -q "error"

      - name: E2E — POST requires domain field
        run: |
          BODY=$(curl -s -X POST http://localhost:3000/api/filters/fake-id/allowlist \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "$BODY"
          echo "$BODY" | grep -q "domain is required"

      - name: E2E — rate limiter headers present
        run: |
          HEADERS=$(curl -sI http://localhost:3000/api/filters)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "ratelimit"

      - name: E2E — security headers present
        run: |
          HEADERS=$(curl -sI http://localhost:3000/)
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "content-security-policy"
          echo "$HEADERS" | grep -qi "x-content-type-options"

      - name: E2E — container runs as non-root
        run: |
          USER=$(docker exec test-app whoami)
          echo "Running as: $USER"
          [ "$USER" != "root" ] || { echo "Container is running as root!"; exit 1; }

      - name: Cleanup
        if: always()
        run: docker rm -f test-app 2>/dev/null || true
